packages:
  - "packages/*"
  - "apps/*"
  # packages/catalogue is the local-only Claude Design sync surface (gitignored,
  # stripped from the public repo). Excluding it keeps the committed lockfile
  # stable: as a workspace member it would gain an importer entry on the next
  # `pnpm install` in a tree where it exists, breaking CI's --frozen-lockfile.
  - "!packages/catalogue"
