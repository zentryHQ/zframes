name: OAuth CLI probe

# TEMPORARY, dispatch-only diagnostic. Answers one question: does a model call
# made through the Claude Code CLI (`claude -p`) with CLAUDE_CODE_OAUTH_TOKEN
# succeed, or hit the same 429 the raw Messages-API path does? If it succeeds,
# Tier 3 can be rebuilt to drive vision review through `claude -p` (keeping the
# OAuth subscription). If it 429s too, only a metered API key will work.
# Delete this workflow once the question is answered.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code && claude --version

      - name: Text model call through the CLI
        run: |
          echo "--- text probe ---"
          claude -p "Reply with exactly the word: ok" --output-format json > text.json 2>text.err; echo "exit=$?"
          echo "stdout:"; cat text.json || true
          echo "stderr:"; cat text.err || true

      - name: Vision model call through the CLI
        run: |
          echo "--- vision probe ---"
          # a tiny solid-red 2x2 PNG
          printf 'iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAEklEQVR42mP8z8BQz0AEYBxVSAcAAO4CApTk6C0AAAAASUVORK5CYII=' | base64 -d > probe.png || echo "png decode exit=$?"
          claude -p "Read ./probe.png and answer in ONE word: what is its dominant color?" \
            --output-format json --allowedTools Read > vision.json 2>vision.err; echo "exit=$?"
          echo "stdout:"; cat vision.json || true
          echo "stderr:"; cat vision.err || true
