name: Published CLI smoke

# Drives the REAL published `zframes` package (npx/npm registry) end to end:
# init → lint → serve → HTTP-fetch the app + spec + runtime bundle. Catches a
# broken or stale publish — the thing users actually install — which no other
# check guards. Runs on all three OSes users npx from; each OS opens/updates its
# own dedup'd issue (label per matrix row) and auto-closes it when green again.
# Daily + on-demand. (No repo build: the scripts are plain node; we install the
# CLI from the registry, not from source.)

on:
  schedule:
    - cron: "43 6 * * *" # daily 06:43 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: cli-broken # historical label — keeps issue continuity on linux
          - os: macos-latest
            label: cli-broken-macos
          - os: windows-latest
            label: cli-broken-windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash # one shell on all three OSes (windows default is pwsh)
    steps:
      - uses: actions/checkout@v7 # for .github/scripts/*.mjs
      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install published CLI
        run: npm install -g zframes@latest && command -v zframes

      - name: Smoke the published CLI
        continue-on-error: true
        run: node .github/scripts/cli-smoke.mjs

      - name: File / update / close issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/report-to-issue.mjs --kind generic --label ${{ matrix.label }} --report cli-smoke-report.json
