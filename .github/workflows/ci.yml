name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run — only the latest matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · format · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # pnpm version comes from the root package.json `packageManager` field.
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      # --frozen-lockfile fails on lockfile drift; also applies the committed
      # patches/liveline@0.0.7.patch automatically.
      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

      # Slowest step last (full runtime build → tsup → assert-artifacts), so the
      # cheap checks fail fast. This also runs the publish-time artifact guard on
      # every PR — a buildable, packable CLI is verified before merge.
      - run: pnpm build:cli
