version: 2
updates:
  # pnpm is covered by the "npm" ecosystem. Weekly PRs, grouped so a batch of
  # minor/patch bumps arrives as one PR instead of dozens.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
